<!DOCTYPE html>
<!-- guards: none — standalone experimental art piece -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>watercolor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,100..900,0..100,0..1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f0;
  --ink: #2c1e14;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: crosshair;
}

#scene {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#wash {
  position: absolute;
  inset: -12vw -16vw;
  pointer-events: none;
}

.word {
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(3rem, 10vw, 7rem);
  color: var(--ink);
  text-align: center;
  user-select: none;
  line-height: 1.0;
  mix-blend-mode: multiply;
  will-change: font-variation-settings;
}

#w1 { animation: dissolve 10s cubic-bezier(0.45, 0, 0.55, 1) infinite; }
#w2 { animation: dissolve 10s cubic-bezier(0.45, 0, 0.55, 1) infinite; animation-delay: -3.3s; }
#w3 { animation: dissolve 10s cubic-bezier(0.45, 0, 0.55, 1) infinite; animation-delay: -6.6s; }

@keyframes dissolve {
  0%   { font-variation-settings: 'wght' 700, 'opsz' 144, 'SOFT' 0,   'WONK' 0; opacity: 0.92; }
  35%  { font-variation-settings: 'wght' 350, 'opsz' 48,  'SOFT' 55,  'WONK' 0; opacity: 0.74; }
  65%  { font-variation-settings: 'wght' 150, 'opsz' 12,  'SOFT' 100, 'WONK' 0; opacity: 0.52; }
  100% { font-variation-settings: 'wght' 700, 'opsz' 144, 'SOFT' 0,   'WONK' 0; opacity: 0.92; }
}

@media (prefers-reduced-motion: reduce) {
  .word { animation-play-state: paused; }
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="wc" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.016 0.020" numOctaves="5" seed="12" result="noise"/>
      <feColorMatrix id="cm" type="matrix"
        values="0.84 0.14 0.04 0 0.07
                0.06 0.70 0.08 0 0.04
                0.02 0.04 0.52 0 0.01
                0    0    0    0.9 0"
        in="noise" result="tinted"/>
      <feGaussianBlur in="tinted" stdDeviation="5" result="soft"/>
      <feBlend in="SourceGraphic" in2="soft" mode="multiply"/>
    </filter>
  </defs>
</svg>

<div id="scene">
  <svg id="wash" viewBox="0 0 900 600" preserveAspectRatio="xMidYMid slice" filter="url(#wc)" aria-hidden="true">
    <ellipse cx="450" cy="200" rx="380" ry="140" fill="#c4743a" opacity="0.30"/>
    <ellipse cx="280" cy="360" rx="260" ry="160" fill="#7a9e6e" opacity="0.25"/>
    <ellipse cx="620" cy="320" rx="220" ry="180" fill="#c9a84c" opacity="0.22"/>
    <ellipse cx="160" cy="180" rx="180" ry="120" fill="#b85c38" opacity="0.18"/>
    <ellipse cx="740" cy="160" rx="200" ry="100" fill="#8fa86a" opacity="0.20"/>
    <ellipse cx="450" cy="500" rx="300" ry="100" fill="#c4743a" opacity="0.15"/>
  </svg>
  <div class="word" id="w1">water</div>
  <div class="word" id="w2">color</div>
  <div class="word" id="w3">bleed</div>
</div>

<script>
const turb = document.getElementById('turb');
const cm = document.getElementById('cm');
let t = 0;
let rafId;
let frozen = false;

const palettes = [
  [0.84, 0.14, 0.04, 0, 0.07,  0.06, 0.70, 0.08, 0, 0.04,  0.02, 0.04, 0.52, 0, 0.01],
  [0.62, 0.18, 0.06, 0, 0.04,  0.08, 0.80, 0.12, 0, 0.05,  0.04, 0.10, 0.66, 0, 0.02],
  [0.88, 0.16, 0.02, 0, 0.06,  0.10, 0.76, 0.06, 0, 0.06,  0.02, 0.06, 0.46, 0, 0.01],
];

function lerp(a, b, k) { return a + (b - a) * k; }

function step() {
  t += 0.003;

  const bfx = 0.014 + Math.sin(t * 0.35) * 0.007;
  const bfy = 0.018 + Math.cos(t * 0.27) * 0.009;
  turb.setAttribute('baseFrequency', `${bfx.toFixed(4)} ${bfy.toFixed(4)}`);

  const cycle = t * 0.06;
  const pi = Math.floor(cycle) % palettes.length;
  const ni = (pi + 1) % palettes.length;
  const k = cycle - Math.floor(cycle);
  const s = k * k * (3 - 2 * k);
  const m = palettes[pi].map((v, i) => lerp(v, palettes[ni][i], s));
  cm.setAttribute('values', m.map(v => +v.toFixed(4)).join(' '));

  rafId = requestAnimationFrame(step);
}
step();

document.addEventListener('click', () => {
  frozen = !frozen;
  const state = frozen ? 'paused' : 'running';
  if (frozen) {
    cancelAnimationFrame(rafId);
  } else {
    step();
  }
  document.querySelectorAll('.word').forEach(w => w.style.animationPlayState = state);
  document.body.style.cursor = frozen ? 'default' : 'crosshair';
});
</script>
</body>
</html>
