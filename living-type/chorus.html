<!DOCTYPE html>
<!-- guards: none — standalone experimental art piece -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>chorus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,100..900,0..100,0..1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --cream: #e8e4de;
  --terra: #c4623a;
  --teal: #5ba8a0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
#prompt {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(1rem, 3vw, 1.8rem);
  font-variation-settings: 'wght' 300, 'opsz' 72, 'SOFT' 40, 'WONK' 0;
  color: var(--cream);
  opacity: 0.5;
  pointer-events: none;
  transition: opacity 0.8s;
}
.w {
  position: absolute;
  font-family: 'Fraunces', Georgia, serif;
  white-space: nowrap;
  line-height: 1;
  user-select: none;
  will-change: font-variation-settings, opacity, transform;
}
@media (prefers-reduced-motion: reduce) {
  .w { transition: none !important; }
}
</style>
</head>
<body>
<div id="prompt">click to begin</div>
<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const MAX = 35;
const FADE_AT = 20000;
const REMOVE_AT = 25000;
const SILENCE_RESTART = 50000;
let started = false;
let frozen = false;
let words = [];
let analyser, timeData, freqData;
let lastSpeech = 0;
let audioStream = null;
let rec;

if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  frozen = true;
}

function r(a, b) { return a + Math.random() * (b - a); }
function ri(a, b) { return Math.round(r(a, b)); }

function getRMS() {
  if (!analyser) return 0;
  analyser.getByteTimeDomainData(timeData);
  let sum = 0;
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] - 128) / 128;
    sum += v * v;
  }
  return Math.sqrt(sum / timeData.length);
}

function getFreqBias() {
  if (!analyser) return 0;
  analyser.getByteFrequencyData(freqData);
  const len = freqData.length;
  const bass  = freqData.slice(0,  Math.floor(len * 0.1)).reduce((s, v) => s + v, 0) / (len * 0.1);
  const treble = freqData.slice(Math.floor(len * 0.6)).reduce((s, v) => s + v, 0) / (len * 0.4);
  if (bass + treble < 5) return 0;
  return (treble - bass) / (treble + bass);
}

function energyColor(rms, bias) {
  if (rms < 0.01) return '#e8e4de';
  if (bias > 0.3) return '#5ba8a0';
  if (bias < -0.3) return '#c4623a';
  return '#d4c4a0';
}

function energyParams(rms) {
  if (rms < 0.02) {
    return { lo: 300, hi: 500, dur: 8000, rot: r(-4, 4), scale: 1 };
  } else if (rms < 0.08) {
    return { lo: 200, hi: 700, dur: 4000, rot: r(-8, 8), scale: 1 };
  } else {
    return { lo: 100, hi: 900, dur: 500, rot: r(-15, 15), scale: r(1.05, 1.2) };
  }
}

// Single rAF loop — no insertRule/deleteRule
function animate() {
  if (frozen) { requestAnimationFrame(animate); return; }
  const now = Date.now();

  // Age-based sweep: fade at 20s, remove at 25s
  for (let i = words.length - 1; i >= 0; i--) {
    const w = words[i];
    const age = now - w.born;
    if (age >= REMOVE_AT) {
      w.el.remove();
      words.splice(i, 1);
      continue;
    }
    if (!w.fading && age >= FADE_AT) {
      w.fading = true;
      w.el.style.transition = 'opacity 5s';
      w.el.style.opacity = '0';
    }
    const t = ((now - w.born) % w.dur) / w.dur;
    const s = 0.5 - 0.5 * Math.cos(t * Math.PI * 2);
    const wght = Math.round(w.wghtLo + s * (w.wghtHi - w.wghtLo));
    const rot = w.rot * (1 - 2 * s);
    const sc = 1 + s * (w.scale - 1);
    w.el.style.fontVariationSettings = `'wght' ${wght}, 'opsz' ${w.opsz}, 'SOFT' ${w.soft}, 'WONK' ${w.wonk}`;
    w.el.style.transform = `rotate(${rot.toFixed(1)}deg) scale(${sc.toFixed(2)})`;
  }

  // Chrome 60s silence restart
  if (started && rec && now - lastSpeech > SILENCE_RESTART) {
    lastSpeech = now;
    try { rec.stop(); } catch (e) {}
  }

  requestAnimationFrame(animate);
}

function placeWord(text) {
  if (words.length >= MAX) {
    const old = words.shift();
    old.el.remove();
  }

  const rms  = getRMS();
  const bias = getFreqBias();
  const color = energyColor(rms, bias);
  const { lo, hi, dur, rot, scale } = energyParams(rms);
  const opsz = ri(9, 144);
  const soft = ri(0, 80);
  const wonk = rms > 0.08 ? 1 : 0;
  const sz   = r(2, 7).toFixed(1);

  const el = document.createElement('span');
  el.className = 'w';
  el.textContent = text;
  el.style.cssText = `
    font-size: clamp(1.2rem, ${sz}vw, 4rem);
    font-variation-settings: 'wght' ${ri(lo, hi)}, 'opsz' ${opsz}, 'SOFT' ${soft}, 'WONK' ${wonk};
    color: ${color};
    opacity: 1;
  `;

  document.body.appendChild(el);

  requestAnimationFrame(() => {
    const pad = 40;
    const w = el.offsetWidth  || 60;
    const h = el.offsetHeight || 30;
    el.style.left = r(pad, Math.max(pad + 1, window.innerWidth  - w - pad)) + 'px';
    el.style.top  = r(pad, Math.max(pad + 1, window.innerHeight - h - pad)) + 'px';
  });

  words.push({ el, born: Date.now(), wghtLo: lo, wghtHi: hi, opsz, soft, wonk, dur, rot, scale, fading: false });
}

async function start() {
  if (started) return;
  if (!SR) {
    const p = document.getElementById('prompt');
    p.textContent = 'speech recognition requires Chrome, Edge, or Safari on macOS';
    p.style.opacity = '0.7';
    return;
  }
  started = true;
  lastSpeech = Date.now();
  const prompt = document.getElementById('prompt');

  try {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ctx = new AudioContext();
    if (ctx.state === 'suspended') await ctx.resume();
    const src = ctx.createMediaStreamSource(audioStream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    timeData = new Uint8Array(analyser.fftSize);
    freqData = new Uint8Array(analyser.frequencyBinCount);
  } catch (e) {
    prompt.textContent = 'mic access denied';
    prompt.style.opacity = '0.7';
    return;
  }

  prompt.textContent = 'listening…';
  setTimeout(() => { prompt.style.opacity = '0'; }, 2000);

  rec = new SR();
  rec.continuous = true;
  rec.interimResults = false;
  rec.lang = 'en-US';

  rec.onresult = (event) => {
    lastSpeech = Date.now();
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        event.results[i][0].transcript.trim().split(/\s+/).forEach(w => {
          if (w) placeWord(w);
        });
      }
    }
  };

  rec.onerror = () => {};
  rec.onend = () => { if (started) rec.start(); };
  rec.start();

  requestAnimationFrame(animate);
}

document.addEventListener('click', start);

window.addEventListener('beforeunload', () => {
  if (audioStream) audioStream.getTracks().forEach(t => t.stop());
});
</script>
</body>
</html>
