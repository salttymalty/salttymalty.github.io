<!DOCTYPE html>
<!-- guards: none — standalone experimental art piece -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>brutalist</title>
<style>
:root {
  --black: #0f0e0c;
  --white: #f5f0e8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  cursor: crosshair;
}

body {
  background: var(--black);
  display: grid;
  align-content: start;
}

.row {
  display: flex;
  overflow: hidden;
  height: clamp(4rem, 13.6vw, 12rem);
}

.row:nth-child(odd)  { background: var(--black); color: var(--white); }
.row:nth-child(even) { background: var(--white); color: var(--black); }

.cell {
  font-family: Helvetica, Arial, sans-serif;
  font-size: clamp(4rem, 13vw, 12rem);
  font-weight: 400;
  line-height: 0.88;
  white-space: nowrap;
  user-select: none;
  padding: 0 0.1em;
  will-change: font-weight;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

.cell:nth-child(7n+1) { animation: stamp 1.1s steps(1, end) infinite; animation-delay:  0s; }
.cell:nth-child(7n+2) { animation: stamp 1.4s steps(1, end) infinite; animation-delay: -0.3s; }
.cell:nth-child(7n+3) { animation: stamp 1.7s steps(1, end) infinite; animation-delay: -0.7s; }
.cell:nth-child(7n+4) { animation: stamp 2.1s steps(1, end) infinite; animation-delay: -0.5s; }
.cell:nth-child(7n+5) { animation: stamp 1.3s steps(1, end) infinite; animation-delay: -1.0s; }
.cell:nth-child(7n+6) { animation: stamp 1.8s steps(1, end) infinite; animation-delay: -0.2s; }
.cell:nth-child(7n+0) { animation: stamp 2.4s steps(1, end) infinite; animation-delay: -1.4s; }

@keyframes stamp {
  0%   { font-weight: 100; }
  25%  { font-weight: 400; }
  50%  { font-weight: 700; }
  75%  { font-weight: 900; }
  100% { font-weight: 100; }
}

@keyframes hint-show {
  0%   { opacity: 0; }
  20%  { opacity: 0.4; }
  100% { opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
  .cell { animation-play-state: paused; }
}
</style>
</head>
<body>
<div id="hint" style="position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  font-family:'Source Sans 3',system-ui,sans-serif;font-size:0.8rem;
  color:var(--white);opacity:0;pointer-events:none;z-index:10;
  animation:hint-show 3s ease 2s forwards;">click to freeze</div>
<script>
(function() {
  const W = 'WEIGHT';
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const rowH = Math.max(64, Math.min(192, vw * 0.136));
  const rowCount = Math.ceil(vh / rowH) + 1;
  // Estimate cells: each character ~0.6em wide, word is 6 chars + padding
  const cellW = vw * 0.13 * W.length * 0.62;
  const cellsPerRow = Math.ceil(vw / cellW) + 2;

  const frag = document.createDocumentFragment();
  for (let r = 0; r < rowCount; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    for (let c = 0; c < cellsPerRow; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = W;
      row.appendChild(cell);
    }
    frag.appendChild(row);
  }
  document.body.appendChild(frag);

  let frozen = false;
  document.addEventListener('click', () => {
    frozen = !frozen;
    const state = frozen ? 'paused' : 'running';
    document.querySelectorAll('.cell').forEach(c => c.style.animationPlayState = state);
    document.body.style.cursor = frozen ? 'default' : 'crosshair';
  });
})();
</script>
</body>
</html>
