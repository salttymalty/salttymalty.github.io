<!DOCTYPE html>
<!-- guards: none — standalone experimental art piece -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>speak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,100..900,0..100,0..1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --cream: #e8e4de;
  --terra: #c4623a;
  --sand: #d4c4a0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
#prompt {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(1rem, 3vw, 1.8rem);
  font-variation-settings: 'wght' 300, 'opsz' 72, 'SOFT' 40, 'WONK' 0;
  color: var(--cream);
  opacity: 0.5;
  pointer-events: none;
  transition: opacity 0.6s;
}
.w {
  position: absolute;
  font-family: 'Fraunces', Georgia, serif;
  white-space: nowrap;
  line-height: 1;
  user-select: none;
  will-change: font-variation-settings, opacity;
}
@keyframes fade-out {
  to { opacity: 0; }
}
@media (prefers-reduced-motion: reduce) {
  .w { animation-play-state: paused !important; }
}
</style>
</head>
<body>
<div id="prompt">click to speak</div>
<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const COLORS = ['#e8e4de','#e8e4de','#d4c4a0','#c4623a','#c4623a'];
const MAX = 40;
let started = false;
let words = [];

function r(a, b) { return a + Math.random() * (b - a); }
function ri(a, b) { return Math.round(r(a, b)); }

function placeWord(text) {
  if (words.length >= MAX) {
    const old = words.shift();
    old.el.remove();
  }
  const el = document.createElement('span');
  el.className = 'w';
  el.textContent = text;

  const wght = ri(100, 900);
  const opsz = ri(9, 144);
  const soft = ri(0, 100);
  const wonk = Math.random() > 0.7 ? 1 : 0;
  const sz = r(2, 8).toFixed(1);
  const rot = r(-8, 8).toFixed(1);
  const color = COLORS[ri(0, COLORS.length - 1)];
  const dur = ri(4000, 10000);
  const wghtLo = Math.max(100, wght - ri(100, 300));
  const wghtHi = Math.min(900, wght + ri(100, 300));

  el.style.cssText = `
    font-size: clamp(1.2rem, ${sz}vw, 4rem);
    font-variation-settings: 'wght' ${wght}, 'opsz' ${opsz}, 'SOFT' ${soft}, 'WONK' ${wonk};
    color: ${color};
    transform: rotate(${rot}deg);
    opacity: 1;
  `;

  // inject per-element keyframe for weight breathing
  const id = 'k' + Date.now() + Math.random().toString(36).slice(2);
  const sheet = document.styleSheets[0];
  sheet.insertRule(`@keyframes ${id} {
    0%,100% { font-variation-settings: 'wght' ${wghtLo}, 'opsz' ${opsz}, 'SOFT' ${soft}, 'WONK' ${wonk}; }
    50%      { font-variation-settings: 'wght' ${wghtHi}, 'opsz' ${opsz}, 'SOFT' ${soft}, 'WONK' ${wonk}; }
  }`, sheet.cssRules.length);
  el.style.animation = `${id} ${dur}ms ease-in-out infinite`;

  document.body.appendChild(el);

  // place after paint so offsetWidth is real
  requestAnimationFrame(() => {
    const pad = 40;
    const w = el.offsetWidth  || 60;
    const h = el.offsetHeight || 30;
    el.style.left = r(pad, Math.max(pad + 1, window.innerWidth  - w - pad)) + 'px';
    el.style.top  = r(pad, Math.max(pad + 1, window.innerHeight - h - pad)) + 'px';
  });

  const entry = { el, born: Date.now() };
  words.push(entry);

  // fade after 15s, remove after 20s
  setTimeout(() => {
    el.style.transition = 'opacity 5s';
    el.style.opacity = '0';
  }, 15000);
  setTimeout(() => {
    el.remove();
    words = words.filter(w => w !== entry);
  }, 20000);
}

function start() {
  if (started) return;
  if (!SR) {
    document.getElementById('prompt').textContent = 'speech recognition not available in this browser';
    document.getElementById('prompt').style.opacity = '0.7';
    return;
  }
  started = true;
  const prompt = document.getElementById('prompt');
  prompt.textContent = 'listening…';
  setTimeout(() => { prompt.style.opacity = '0'; }, 2000);

  const rec = new SR();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'en-US';

  rec.onresult = (event) => {
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        event.results[i][0].transcript.trim().split(/\s+/).forEach(w => {
          if (w) placeWord(w);
        });
      }
    }
  };

  rec.onerror = (e) => {
    if (e.error === 'not-allowed') {
      prompt.textContent = 'mic access denied';
      prompt.style.opacity = '0.7';
    }
  };

  rec.onend = () => { if (started) rec.start(); };
  rec.start();
}

document.addEventListener('click', start);
</script>
</body>
</html>
