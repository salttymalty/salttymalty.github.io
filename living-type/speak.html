<!DOCTYPE html>
<!-- guards: none — standalone experimental art piece -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>speak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,100..900,0..100,0..1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --cream: #e8e4de;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
#prompt {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(1rem, 3vw, 1.8rem);
  font-variation-settings: 'wght' 300, 'opsz' 72, 'SOFT' 40, 'WONK' 0;
  color: var(--cream);
  opacity: 0.5;
  pointer-events: none;
  transition: opacity 0.6s;
}
.w {
  position: absolute;
  font-family: 'Fraunces', Georgia, serif;
  white-space: nowrap;
  line-height: 1;
  user-select: none;
}
@media (prefers-reduced-motion: reduce) {
  .w { transition: none !important; }
}
</style>
</head>
<body>
<div id="prompt">click to speak</div>
<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const COLORS = ['#e8e4de','#e8e4de','#d4c4a0','#c4623a','#c4623a'];
const MAX = 40;
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let started = false;
let words = [];

function r(a, b) { return a + Math.random() * (b - a); }
function ri(a, b) { return Math.round(r(a, b)); }

function animate() {
  if (!reducedMotion) {
    const now = Date.now();
    for (const w of words) {
      const t = ((now - w.born) % w.dur) / w.dur;
      const s = 0.5 - 0.5 * Math.cos(t * Math.PI * 2);
      const wght = Math.round(w.wghtLo + s * (w.wghtHi - w.wghtLo));
      w.el.style.fontVariationSettings = `'wght' ${wght},'opsz' ${w.opsz},'SOFT' ${w.soft},'WONK' ${w.wonk}`;
    }
  }
  requestAnimationFrame(animate);
}
animate();

setInterval(() => {
  const now = Date.now();
  for (const w of words) {
    const age = now - w.born;
    if (age > 15000 && !w.fading) {
      w.fading = true;
      w.el.style.transition = 'opacity 5s';
      w.el.style.opacity = '0';
    }
    if (age > 20000) {
      w.el.remove();
    }
  }
  words = words.filter(w => (Date.now() - w.born) <= 20000);
}, 1000);

function placeWord(text) {
  if (words.length >= MAX) {
    const old = words.shift();
    old.el.remove();
  }
  const el = document.createElement('span');
  el.className = 'w';
  el.textContent = text;

  const wght = ri(100, 900);
  const opsz = ri(9, 144);
  const soft = ri(0, 100);
  const wonk = Math.random() > 0.7 ? 1 : 0;
  const sz = r(2, 8).toFixed(1);
  const rot = r(-8, 8).toFixed(1);
  const color = COLORS[ri(0, COLORS.length - 1)];
  const dur = ri(4000, 10000);
  const wghtLo = Math.max(100, wght - ri(100, 300));
  const wghtHi = Math.min(900, wght + ri(100, 300));

  el.style.cssText = `font-size:clamp(1.2rem,${sz}vw,4rem);font-variation-settings:'wght' ${wght},'opsz' ${opsz},'SOFT' ${soft},'WONK' ${wonk};color:${color};transform:rotate(${rot}deg);opacity:1`;

  document.body.appendChild(el);

  requestAnimationFrame(() => {
    const p=40, w=el.offsetWidth||60, h=el.offsetHeight||30;
    el.style.left = r(p, Math.max(p+1, window.innerWidth -w-p)) + 'px';
    el.style.top  = r(p, Math.max(p+1, window.innerHeight-h-p)) + 'px';
  });

  words.push({ el, born: Date.now(), wghtLo, wghtHi, opsz, soft, wonk, dur, fading: false });
}

function start() {
  if (started) return;
  if (!SR) {
    const prompt = document.getElementById('prompt');
    prompt.textContent = 'speech recognition requires Chrome, Edge, or Safari on macOS';
    prompt.style.opacity = '0.7';
    return;
  }
  started = true;
  const prompt = document.getElementById('prompt');
  prompt.textContent='listening…';
  setTimeout(()=>{prompt.style.opacity='0';},2000);

  let lastSpeech = Date.now();

  const rec = new SR();
  rec.continuous = true;
  rec.interimResults = false;
  rec.lang = 'en-US';

  rec.onresult = (e) => {
    lastSpeech = Date.now();
    for (let i = e.resultIndex; i < e.results.length; i++)
      if (e.results[i].isFinal)
        e.results[i][0].transcript.trim().split(/\s+/).forEach(w => { if (w) placeWord(w); });
  };
  rec.onerror = (e) => { if (e.error==='not-allowed') { prompt.textContent='mic access denied'; prompt.style.opacity='0.7'; } };

  rec.onend = () => { if (started) rec.start(); };
  rec.start();
  setInterval(() => {
    if (started && Date.now()-lastSpeech > 50000) {
      lastSpeech = Date.now();
      try{rec.stop()}catch(e){}
      setTimeout(()=>{try{rec.start()}catch(e){}},200);
    }
  }, 10000);
}

document.addEventListener('click', start);
</script>
</body>
</html>
