<!DOCTYPE html>
<!-- guards: none — standalone experimental art piece -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,100..900,0..100,0..1&family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..1000,0..1,0..1,0..1&display=swap" rel="stylesheet">
<style>
:root {
  --color-bg: #0a0908;
  --color-text: #f9f8f6;
  --color-accent: #b8652a;
  --color-hot: #e85d26;
  --color-cool: #58a6ff;
  --color-green: #7ee787;
  --color-gold: #e3b341;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--color-bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  cursor: crosshair;
  gap: 1vh;
}

.pulse {
  font-family: 'Fraunces', Georgia, serif;
  text-align: center;
  user-select: none;
  will-change: font-variation-settings, transform, color, opacity;
}

#r1 {
  font-size: clamp(5rem, 20vw, 16rem);
  animation: slam-1 2.4s cubic-bezier(0.2, 0, 0, 1) infinite;
  color: var(--color-hot);
}

#r2 {
  font-family: 'Recursive', monospace;
  font-size: clamp(2rem, 6vw, 5rem);
  animation: slam-2 1.6s cubic-bezier(0.2, 0, 0, 1) infinite;
  color: var(--color-cool);
  letter-spacing: 0.1em;
}

#r3 {
  font-size: clamp(6rem, 25vw, 20rem);
  animation: slam-3 3.2s cubic-bezier(0.2, 0, 0, 1) infinite;
  color: var(--color-text);
  line-height: 0.85;
}

#r4 {
  font-family: 'Recursive', monospace;
  font-size: clamp(1.5rem, 4vw, 3rem);
  animation: slam-4 0.8s cubic-bezier(0.2, 0, 0, 1) infinite;
  color: var(--color-green);
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

#r5 {
  font-size: clamp(3rem, 10vw, 8rem);
  animation: slam-5 5s cubic-bezier(0.2, 0, 0, 1) infinite;
  color: var(--color-gold);
  opacity: 0.7;
}

/* FAST — these are aggressive, not gentle breathes */

@keyframes slam-1 {
  0%   { font-variation-settings: 'wght' 900, 'opsz' 144, 'SOFT' 0, 'WONK' 0; transform: scale(1); }
  8%   { font-variation-settings: 'wght' 900, 'opsz' 144, 'SOFT' 0, 'WONK' 0; transform: scale(1.15); }
  20%  { font-variation-settings: 'wght' 100, 'opsz' 9, 'SOFT' 100, 'WONK' 1; transform: scale(0.9); }
  100% { font-variation-settings: 'wght' 900, 'opsz' 144, 'SOFT' 0, 'WONK' 0; transform: scale(1); }
}

@keyframes slam-2 {
  0%   { font-variation-settings: 'MONO' 1, 'CASL' 0, 'wght' 300, 'slnt' 0, 'CRSV' 0; transform: scaleX(1); }
  10%  { font-variation-settings: 'MONO' 0, 'CASL' 1, 'wght' 1000, 'slnt' -15, 'CRSV' 1; transform: scaleX(1.3); }
  25%  { font-variation-settings: 'MONO' 1, 'CASL' 0, 'wght' 300, 'slnt' 0, 'CRSV' 0; transform: scaleX(0.85); }
  100% { font-variation-settings: 'MONO' 1, 'CASL' 0, 'wght' 300, 'slnt' 0, 'CRSV' 0; transform: scaleX(1); }
}

@keyframes slam-3 {
  0%   { font-variation-settings: 'wght' 200, 'opsz' 9, 'SOFT' 100, 'WONK' 1; transform: scale(1) rotate(0deg); }
  15%  { font-variation-settings: 'wght' 900, 'opsz' 144, 'SOFT' 0, 'WONK' 0; transform: scale(1.08) rotate(-2deg); }
  30%  { font-variation-settings: 'wght' 200, 'opsz' 9, 'SOFT' 100, 'WONK' 1; transform: scale(0.95) rotate(1deg); }
  45%  { font-variation-settings: 'wght' 800, 'opsz' 96, 'SOFT' 20, 'WONK' 0; transform: scale(1.05) rotate(-1deg); }
  60%  { font-variation-settings: 'wght' 300, 'opsz' 24, 'SOFT' 80, 'WONK' 1; transform: scale(0.97) rotate(0.5deg); }
  100% { font-variation-settings: 'wght' 200, 'opsz' 9, 'SOFT' 100, 'WONK' 1; transform: scale(1) rotate(0deg); }
}

@keyframes slam-4 {
  0%   { font-variation-settings: 'MONO' 1, 'CASL' 0, 'wght' 800, 'slnt' 0, 'CRSV' 0; opacity: 1; }
  50%  { font-variation-settings: 'MONO' 0, 'CASL' 1, 'wght' 300, 'slnt' -15, 'CRSV' 1; opacity: 0.3; }
  100% { font-variation-settings: 'MONO' 1, 'CASL' 0, 'wght' 800, 'slnt' 0, 'CRSV' 0; opacity: 1; }
}

@keyframes slam-5 {
  0%   { font-variation-settings: 'wght' 400, 'opsz' 48, 'SOFT' 60, 'WONK' 0; transform: translateY(0); }
  20%  { font-variation-settings: 'wght' 900, 'opsz' 144, 'SOFT' 0, 'WONK' 0; transform: translateY(-8px); }
  40%  { font-variation-settings: 'wght' 100, 'opsz' 9, 'SOFT' 100, 'WONK' 1; transform: translateY(5px); }
  60%  { font-variation-settings: 'wght' 700, 'opsz' 96, 'SOFT' 30, 'WONK' 1; transform: translateY(-3px); }
  100% { font-variation-settings: 'wght' 400, 'opsz' 48, 'SOFT' 60, 'WONK' 0; transform: translateY(0); }
}

/* Strobe on mouse */
body.strobe #r1 { color: var(--color-text); }
body.strobe #r2 { color: var(--color-hot); }
body.strobe #r3 { color: var(--color-cool); }
body.strobe #r4 { color: var(--color-gold); }
body.strobe #r5 { color: var(--color-green); }

@media (prefers-reduced-motion: reduce) {
  .pulse { animation-play-state: paused; }
}
</style>
</head>
<body>

<div id="r1" class="pulse">TYPE</div>
<div id="r2" class="pulse">is not static</div>
<div id="r3" class="pulse">ALIVE</div>
<div id="r4" class="pulse">pulse pulse pulse</div>
<div id="r5" class="pulse">never stops</div>

<script>
let strobe = false;
document.addEventListener('mousemove', () => {
  if (!strobe) { document.body.classList.add('strobe'); strobe = true; }
});
document.addEventListener('mouseleave', () => {
  document.body.classList.remove('strobe'); strobe = false;
});
let frozen = false;
document.addEventListener('click', () => {
  frozen = !frozen;
  document.querySelectorAll('.pulse').forEach(p => {
    p.style.animationPlayState = frozen ? 'paused' : 'running';
  });
  document.body.style.cursor = frozen ? 'default' : 'crosshair';
});
</script>
</body>
</html>
