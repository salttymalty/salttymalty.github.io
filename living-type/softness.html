<!DOCTYPE html>
<!-- guards: none — standalone experimental art piece -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>softness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,100..900,0..100,0..1&display=swap" rel="stylesheet">
<style>
:root {
  --color-bg: #0f0e0c;
  --color-text: #e8e4de;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--color-bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: crosshair;
}

#stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(0.25rem, 1vw, 0.75rem);
}

/* @property enables smooth numeric interpolation for SOFT axis.
   Requires Chrome 85+ / Safari 16.4+. Firefox degrades to static — font won't animate. */
@property --soft {
  syntax: '<number>';
  initial-value: 0;
  inherits: false;
}

.word {
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(2rem, 8vw, 6rem);
  font-variation-settings: 'wght' 600, 'opsz' 72, 'SOFT' var(--soft), 'WONK' 0;
  color: var(--color-text);
  user-select: none;
  animation: soften 8s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  will-change: font-variation-settings;
  line-height: 1.1;
}

.word:nth-child(1) { animation-delay: 0s; }
.word:nth-child(2) { animation-delay: 1.6s; }
.word:nth-child(3) { animation-delay: 3.2s; }
.word:nth-child(4) { animation-delay: 4.8s; }
.word:nth-child(5) { animation-delay: 6.4s; }

@keyframes soften {
  0%, 100% { --soft: 0;   }
  50%       { --soft: 100; }
}

@keyframes hint-show {
  0%   { opacity: 0; }
  20%  { opacity: 0.4; }
  100% { opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
  .word { animation-play-state: paused; }
}
</style>
</head>
<body>

<div id="hint" style="position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  font-family:'Source Sans 3',system-ui,sans-serif;font-size:0.8rem;
  color:var(--color-text);opacity:0;pointer-events:none;
  animation:hint-show 3s ease 2s forwards;">click to freeze</div>
<div id="stack">
  <div class="word">serif</div>
  <div class="word">serif</div>
  <div class="word">serif</div>
  <div class="word">serif</div>
  <div class="word">serif</div>
</div>

<script>
let frozen = false;
document.addEventListener('click', () => {
  frozen = !frozen;
  const state = frozen ? 'paused' : 'running';
  document.querySelectorAll('.word').forEach(w => w.style.animationPlayState = state);
  document.body.style.cursor = frozen ? 'default' : 'crosshair';
});
</script>
</body>
</html>
