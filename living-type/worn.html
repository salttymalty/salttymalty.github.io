<!DOCTYPE html>
<!-- guards: none — standalone experimental art piece -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>worn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,100..900,0..100,0..1&display=swap" rel="stylesheet">
<style>
:root {
  --color-bg: #f5f0e8;
  --color-text: #1a1714;
  --color-accent: #b8652a;
  --color-mid: #6b6058;
  --color-ghost: #c4bba8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--color-bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  padding: 0 10vw;
  overflow: hidden;
  cursor: default;
}

svg { position: absolute; width: 0; height: 0; }

#poem {
  max-width: 70ch;
}

.verse {
  font-family: 'Fraunces', Georgia, serif;
  line-height: 1.4;
  margin-bottom: 1.2em;
  color: var(--color-text);
}

.verse span {
  display: inline-block;
  filter: url(#grain);
  transition: font-variation-settings 3s ease;
}

/* Sun marks placed like printer's ornaments */
.ornament {
  display: inline-block;
  width: 1.2em;
  height: 1.2em;
  vertical-align: -0.15em;
  opacity: 0.25;
  filter: url(#grain);
  margin: 0 0.1em;
}

.break-mark {
  display: block;
  width: 2.5em;
  height: 2.5em;
  opacity: 0.12;
  margin: 0.8em 0;
  filter: url(#grain);
}

/* Subtle scattered marks in the margins */
.margin-mark {
  position: fixed;
  pointer-events: none;
  opacity: 0.04;
  filter: url(#grain);
}

@media (prefers-reduced-motion: reduce) {
  .verse span { transition: none; }
}
</style>
</head>
<body>

<svg>
  <defs>
    <!-- Film grain texture overlay -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono-noise"/>
      <feBlend in="SourceGraphic" in2="mono-noise" mode="multiply" result="grained"/>
      <feComponentTransfer in="grained">
        <feFuncA type="linear" slope="1" intercept="0"/>
      </feComponentTransfer>
    </filter>
  </defs>
</svg>

<!-- Margin marks — like pencil notes in the gutter -->
<img src="marks/sun-organic.svg" class="margin-mark" style="right: 4vw; top: 18vh; width: 80px; transform: rotate(12deg);" alt="">
<img src="marks/eye.svg" class="margin-mark" style="right: 6vw; bottom: 25vh; width: 50px; transform: rotate(-5deg); opacity: 0.03;" alt="">
<img src="marks/sun-compact.svg" class="margin-mark" style="left: 3vw; bottom: 12vh; width: 40px; transform: rotate(8deg); opacity: 0.035;" alt="">

<div id="poem"></div>

<script>
const lines = [
  { text: 'the ink never dries the same way twice', size: 'clamp(1.6rem, 3.5vw, 2.8rem)', weight: 'medium' },
  { text: 'each letter carries', size: 'clamp(2.2rem, 5vw, 4rem)', weight: 'heavy' },
  { text: 'the weight of the hand that made it', size: 'clamp(1.4rem, 3vw, 2.2rem)', weight: 'light', color: 'var(--color-mid)' },
  { break: true },
  { text: 'some mornings the pen pulls harder', size: 'clamp(1.8rem, 4vw, 3rem)', weight: 'medium' },
  { text: 'some lines come out wrong', size: 'clamp(2.5rem, 6vw, 5rem)', weight: 'heavy', color: 'var(--color-accent)' },
  { text: 'and those are the ones you keep', size: 'clamp(1.3rem, 2.8vw, 2rem)', weight: 'light', color: 'var(--color-mid)' },
  { break: true },
  { text: 'nothing printed feels like this', size: 'clamp(1.6rem, 3.5vw, 2.8rem)', weight: 'medium', color: 'var(--color-ghost)' },
];

const poem = document.getElementById('poem');

// Variation ranges per weight class — heavier text gets less variation (more confident)
const RANGES = {
  light:  { wghtMin: 200, wghtMax: 500, softMin: 40, softMax: 100, opszMin: 9,  opszMax: 72,  rotMax: 2.5, yMax: 3 },
  medium: { wghtMin: 350, wghtMax: 650, softMin: 20, softMax: 80,  opszMin: 24, opszMax: 96,  rotMax: 1.5, yMax: 2 },
  heavy:  { wghtMin: 500, wghtMax: 800, softMin: 0,  softMax: 50,  opszMin: 48, opszMax: 144, rotMax: 0.8, yMax: 1 },
};

function rand(min, max) { return min + Math.random() * (max - min); }

lines.forEach(line => {
  if (line.break) {
    const mark = document.createElement('img');
    mark.src = 'marks/sun-expressive.svg';
    mark.className = 'break-mark';
    mark.alt = '';
    poem.appendChild(mark);
    return;
  }

  const verse = document.createElement('div');
  verse.className = 'verse';
  verse.style.fontSize = line.size;
  if (line.color) verse.style.color = line.color;

  const r = RANGES[line.weight];

  line.text.split('').forEach((char, i) => {
    if (char === ' ') {
      verse.appendChild(document.createTextNode('\u00A0'));
      return;
    }

    const span = document.createElement('span');
    span.textContent = char;

    // Each letter gets its own frozen variation — like ink that dried differently
    const wght = Math.round(rand(r.wghtMin, r.wghtMax));
    const soft = Math.round(rand(r.softMin, r.softMax));
    const opsz = Math.round(rand(r.opszMin, r.opszMax));
    const wonk = Math.random() > 0.6 ? 1 : 0;
    const rot = (Math.random() - 0.5) * r.rotMax * 2;
    const yOff = (Math.random() - 0.5) * r.yMax * 2;
    const opacity = 0.75 + Math.random() * 0.25;

    span.style.fontVariationSettings = `'wght' ${wght}, 'opsz' ${opsz}, 'SOFT' ${soft}, 'WONK' ${wonk}`;
    span.style.transform = `rotate(${rot.toFixed(2)}deg) translateY(${yOff.toFixed(1)}px)`;
    span.style.opacity = opacity.toFixed(2);

    // Store the letter's "natural" state
    span.dataset.wght = wght;
    span.dataset.soft = soft;
    span.dataset.opsz = opsz;
    span.dataset.wonk = wonk;

    verse.appendChild(span);
  });

  // Inline sun ornament at end of some verses
  if (Math.random() > 0.65) {
    const orn = document.createElement('img');
    orn.src = Math.random() > 0.5 ? 'marks/sun-organic.svg' : 'marks/sun-compact.svg';
    orn.className = 'ornament';
    orn.alt = '';
    verse.appendChild(orn);
  }

  poem.appendChild(verse);
});

// Hover: letters nearby shift slightly, like ink responding to breath
document.addEventListener('mousemove', (e) => {
  const spans = document.querySelectorAll('.verse span');
  spans.forEach(span => {
    const rect = span.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const radius = 120;

    if (dist < radius) {
      const p = 1 - dist / radius;
      const baseWght = parseInt(span.dataset.wght);
      const baseSoft = parseInt(span.dataset.soft);
      const newWght = Math.round(baseWght + p * 150);
      const newSoft = Math.round(Math.min(100, baseSoft + p * 30));
      span.style.fontVariationSettings =
        `'wght' ${newWght}, 'opsz' ${span.dataset.opsz}, 'SOFT' ${newSoft}, 'WONK' ${span.dataset.wonk}`;
    } else {
      span.style.fontVariationSettings =
        `'wght' ${span.dataset.wght}, 'opsz' ${span.dataset.opsz}, 'SOFT' ${span.dataset.soft}, 'WONK' ${span.dataset.wonk}`;
    }
  });
});
</script>
</body>
</html>
