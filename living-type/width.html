<!DOCTYPE html>
<!-- guards: none — standalone experimental art piece -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>width</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght@8..144,75..150,100..1000&display=swap" rel="stylesheet">
<style>
:root {
  --color-bg: #0f0e0c;
  --color-text: #e8e4de;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--color-bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  cursor: crosshair;
  overflow: hidden;
}

/* @property enables smooth numeric interpolation for wdth axis.
   Requires Chrome 85+ / Safari 16.4+. Firefox degrades to static — font won't animate. */
@property --wdth {
  syntax: '<number>';
  initial-value: 75;
  inherits: false;
}

#sentence {
  font-family: 'Roboto Flex', sans-serif;
  font-size: clamp(2rem, 6vw, 5rem);
  color: var(--color-text);
  user-select: none;
  text-align: center;
  line-height: 1.1;
  font-variation-settings: 'wdth' var(--wdth);
  animation: stretch 6s ease-in-out infinite;
  will-change: font-variation-settings;
}

@keyframes stretch {
  0%, 100% { --wdth: 75;  }
  50%       { --wdth: 150; }
}

@keyframes hint-show {
  0%   { opacity: 0; }
  20%  { opacity: 0.4; }
  100% { opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
  #sentence { animation-play-state: paused; }
}
</style>
</head>
<body>

<div id="sentence">typography expands to fill the space it is given</div>
<div id="hint" style="position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  font-family:'Source Sans 3',system-ui,sans-serif;font-size:0.8rem;
  color:var(--color-text);opacity:0;pointer-events:none;
  animation:hint-show 3s ease 2s forwards;">click to freeze</div>

<script>
let frozen = false;
document.addEventListener('click', () => {
  frozen = !frozen;
  document.getElementById('sentence').style.animationPlayState = frozen ? 'paused' : 'running';
  document.body.style.cursor = frozen ? 'default' : 'crosshair';
});
</script>
</body>
</html>
